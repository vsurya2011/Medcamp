<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareNet - Realtime NGO Medical Camp Portal</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Html5Qrcode for scanning -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .dark .glass { background: rgba(31, 41, 55, 0.9); backdrop-filter: blur(10px); }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        
        /* Extra utility animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInDown { from { opacity: 0; transform: translate3d(0, -20px, 0); } to { opacity: 1; transform: translate3d(0, 0, 0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .animate-fade-in-down { animation: fadeInDown 0.4s ease-out forwards; }

        /* QR Scanner Tailwind UI Fixes */
        #reader { width: 100%; border: none !important; border-radius: 12px; overflow: hidden; background: transparent; }
        #reader video { object-fit: cover; border-radius: 12px; width: 100%; }
        
        #reader button {
            background-color: #10b981 !important;
            color: white !important;
            padding: 8px 16px !important;
            border-radius: 8px !important;
            font-weight: 600 !important;
            margin: 8px !important;
            border: none !important;
            cursor: pointer !important;
            transition: background-color 0.2s !important;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1) !important;
        }
        #reader button:hover { background-color: #059669 !important; }
        
        #reader select {
            padding: 10px !important;
            border-radius: 8px !important;
            border: 2px solid #cbd5e1 !important;
            margin: 8px !important;
            background-color: white !important;
            color: #1e293b !important;
            font-weight: 500 !important;
            max-width: 90%;
        }
        
        #reader a { color: #3b82f6 !important; text-decoration: underline !important; font-weight: 500 !important; margin-top: 10px !important; display: inline-block !important; }
        
        /* Google Translate UI Fixes */
        body { top: 0 !important; } 
        .skiptranslate iframe { display: none !important; } 
        
        .goog-te-gadget-simple {
            background-color: #f8fafc !important;
            border: 1px solid #cbd5e1 !important;
            border-radius: 0.75rem !important;
            padding: 0.5rem 1rem !important;
            font-family: 'Inter', sans-serif !important;
            display: inline-flex !important;
            align-items: center !important;
        }
        .dark .goog-te-gadget-simple {
            background-color: #1e293b !important;
            border-color: #475569 !important;
        }
        .goog-te-gadget-simple span { color: #0f172a !important; font-weight: 500 !important; }
        .dark .goog-te-gadget-simple span { color: #f1f5f9 !important; }
        .goog-te-gadget-icon { display: none !important; } 
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 min-h-screen flex flex-col">

    <div id="root" class="flex-grow flex flex-col"></div>

    <script type="text/babel">
        // Default NGO camp staff configuration (Staff roles authenticate on-app, database calls run over a secured background Firebase connection)
        const defaultUsers = [
            { id: 'u1', email: 'admin@ngo.com', pass: 'admin123', role: 'Admin', name: 'Super Admin' },
            { id: 'u2', email: 'vol@ngo.com', pass: 'vol123', role: 'Volunteer', name: 'Main Volunteer' },
            { id: 'u3', email: 'doc1@ngo.com', pass: 'doc123', role: 'Doctor', name: 'Dr. Anand (General)' },
            { id: 'u4', email: 'doc2@ngo.com', pass: 'doc234', role: 'Doctor', name: 'Dr. Priya (Pediatrics)' },
            { id: 'u5', email: 'pharm@ngo.com', pass: 'pharm123', role: 'Pharmacy', name: 'Camp Pharmacy' }
        ];

        const getInitialState = (key, defaultValue) => {
            try {
                const stored = localStorage.getItem(key);
                return stored ? JSON.parse(stored) : defaultValue;
            } catch (e) {
                console.error(`Error reading ${key} from localStorage`, e);
                return defaultValue;
            }
        };

        function MessageBox({ message, type, onClose }) {
            if (!message) return null;
            const bg = type === 'error' ? 'bg-red-100 dark:bg-red-900/40 border-red-500 text-red-700 dark:text-red-400' :
                       type === 'success' ? 'bg-emerald-100 dark:bg-emerald-900/40 border-emerald-500 text-emerald-700 dark:text-emerald-400' :
                       'bg-blue-100 dark:bg-blue-900/40 border-blue-500 text-blue-700 dark:text-blue-400';
            
            return (
                <div className="fixed top-24 left-1/2 transform -translate-x-1/2 z-[100] w-11/12 max-w-md animate-fade-in-down">
                    <div className={`flex items-center p-4 border-l-4 rounded shadow-2xl ${bg} glass`}>
                        <div className="flex-1 font-semibold text-sm">{message}</div>
                        <button onClick={onClose} className="ml-4 opacity-70 hover:opacity-100 transition"><i className="fa-solid fa-xmark"></i></button>
                    </div>
                </div>
            );
        }

        function QRScanner({ onScan, title, onCancel }) {
            React.useEffect(() => {
                const scanner = new Html5QrcodeScanner("reader", { 
                    fps: 10, 
                    qrbox: { width: 250, height: 250 },
                    aspectRatio: 1.0,
                    rememberLastUsedCamera: true, 
                    showTorchButtonIfSupported: true
                }, false);
                
                scanner.render(
                    (decodedText) => {
                        scanner.clear();
                        onScan(decodedText);
                    },
                    (error) => { /* ignore normal loop frame scan errors */ }
                );
                
                return () => {
                    scanner.clear().catch(e => console.error("Scanner clean error:", e));
                };
            }, [onScan]);

            return (
                <div className="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-2xl border dark:border-slate-700 max-w-md w-full mx-auto relative z-10 animate-fade-in-down">
                    <div className="flex justify-between items-center mb-4">
                        <h3 className="font-bold text-lg">{title}</h3>
                        <button onClick={onCancel} className="text-slate-400 hover:text-red-500 transition"><i className="fa-solid fa-xmark text-xl"></i></button>
                    </div>
                    <div id="reader" className="w-full bg-slate-50 dark:bg-slate-900 rounded-xl min-h-[300px] flex flex-col items-center justify-center border-2 border-dashed border-slate-300 dark:border-slate-600">
                    </div>
                    <p className="text-xs text-center text-slate-500 mt-4">Grant camera access when prompted by your browser to initialize device lens scanning.</p>
                </div>
            );
        }

        const GoogleTranslate = React.memo(() => {
            return (
                <div className="flex items-center justify-center mt-2 md:mt-0">
                    <div id="google_translate_element"></div>
                </div>
            );
        }, () => true);

        function App() {
            // Data State
            const [users, setUsers] = React.useState(() => getInitialState('carenet_users', defaultUsers));
            const [patients, setPatients] = React.useState([]); 
            const [currentUser, setCurrentUser] = React.useState(() => getInitialState('carenet_currentUser', null));
            const [myPatientId, setMyPatientId] = React.useState(() => getInitialState('carenet_myPatientId', null));
            
            // Firebase References
            const [firebaseApp, setFirebaseApp] = React.useState(null);
            const [db, setDb] = React.useState(null);
            const [auth, setAuth] = React.useState(null);
            const [isDbReady, setIsDbReady] = React.useState(false);
            const [dbStatusText, setDbStatusText] = React.useState("Initializing system database...");
            const [dbStatusType, setDbStatusType] = React.useState("info"); // info, success, warning, error

            // UI Mode States
            const [view, setView] = React.useState(() => {
                const user = getInitialState('carenet_currentUser', null);
                if (user) return `${user.role.toLowerCase()}-dashboard`;
                const patientId = getInitialState('carenet_myPatientId', null);
                if (patientId) return 'patient-portal';
                return 'home';
            }); 
            const [patientAuthMode, setPatientAuthMode] = React.useState("login"); // "login" or "signup"
            const [darkMode, setDarkMode] = React.useState(false);
            const [message, setMessage] = React.useState(null);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = React.useState(false);
            const [scanningFor, setScanningFor] = React.useState(null);
            const [scannedPatient, setScannedPatient] = React.useState(null);
            const [billingPatient, setBillingPatient] = React.useState(null);

            // Helpers
            const showMsg = (msg, type = 'info') => {
                setMessage({ text: msg, type });
                setTimeout(() => setMessage(null), 4000);
            };

            const getDoctorQueueCount = (docId) => patients.filter(p => p.assignedDoctor === docId && p.status === 'In Queue').length;
            const getQRImage = (text) => `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(text)}`;

            // Save state updates locally for seamless reload fallbacks
            React.useEffect(() => localStorage.setItem('carenet_users', JSON.stringify(users)), [users]);
            React.useEffect(() => localStorage.setItem('carenet_currentUser', JSON.stringify(currentUser)), [currentUser]);
            React.useEffect(() => localStorage.setItem('carenet_myPatientId', JSON.stringify(myPatientId)), [myPatientId]);

            // Handle Dark Mode
            React.useEffect(() => {
                if(darkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [darkMode]);

            React.useEffect(() => {
                let unsubscribe = null;

                const initFirebase = async () => {
                    try {
                        const { initializeApp } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js");
                        const { getAuth, signInAnonymously } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js");
                        const { getFirestore, onSnapshot, collection } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
                        
                        // Exact config supplied by the user 
                        const firebaseConfig = {
                            apiKey: "AIzaSyAF618lKOOC94WIJgIr2P93txBQEb1ELaQ",
                            authDomain: "medcamp-6a0f8.firebaseapp.com",
                            databaseURL: "https://medcamp-6a0f8-default-rtdb.firebaseio.com",
                            projectId: "medcamp-6a0f8",
                            storageBucket: "medcamp-6a0f8.firebasestorage.app",
                            messagingSenderId: "59157365780",
                            appId: "1:59157365780:web:9180b6954ee676a0301301",
                            measurementId: "G-F6S9EWEGRE"
                        };

                        const app = initializeApp(firebaseConfig);
                        const fbAuth = getAuth(app);
                        const database = getFirestore(app);
                        
                        setFirebaseApp(app);
                        setAuth(fbAuth);
                        setDb(database);

                        // Strict Firestore Path Guidelines
                        const targetAppId = "medcamp-6a0f8"; 
                        
                        // Perform silent anonymous staff/visitor background auth if not logged in as a specific patient
                        if (!fbAuth.currentUser) {
                            await signInAnonymously(fbAuth);
                        }

                        // Realtime reactive collection listeners
                        const patientsRef = collection(database, 'artifacts', targetAppId, 'public', 'data', 'patients');
                        unsubscribe = onSnapshot(patientsRef, (snapshot) => {
                            const pts = [];
                            snapshot.forEach(doc => pts.push({ id: doc.id, ...doc.data() }));
                            pts.sort((a, b) => a.timestamp - b.timestamp);
                            setPatients(pts);
                        }, (error) => {
                            console.error("Firebase Snapshot error:", error);
                        });

                        setIsDbReady(true);
                        setDbStatusText("Cloud Database Connected Successfully!");
                        setDbStatusType("success");
                    } catch (error) {
                        console.error("Firebase init failed, switching to fallback offline DB sandbox.", error);
                        setDbStatusText("Cloud Timeout. Sandbox Offline Database Active.");
                        setDbStatusType("warning");
                        
                        // Self-healing database fallback (ensures UI is perfectly usable locally instantly)
                        const offlinePatients = getInitialState('carenet_patients_offline', []);
                        setPatients(offlinePatients);
                        setIsDbReady(true);
                    }
                };

                initFirebase();

                return () => {
                    if (unsubscribe) unsubscribe();
                };
            }, []);

            React.useEffect(() => {
                if (dbStatusType === "warning") {
                    localStorage.setItem('carenet_patients_offline', JSON.stringify(patients));
                }
            }, [patients, dbStatusType]);

            React.useEffect(() => {
                if (!window.googleTranslateElementInit) {
                    window.googleTranslateElementInit = () => {
                        new window.google.translate.TranslateElement({
                            pageLanguage: 'en',
                            includedLanguages: 'ta,en',
                            layout: window.google.translate.TranslateElement.InlineLayout.SIMPLE
                        }, 'google_translate_element');
                    };
                    const script = document.createElement('script');
                    script.src = "//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit";
                    script.async = true;
                    document.body.appendChild(script);
                }
            }, []);

            const handleLogin = (e) => {
                e.preventDefault();
                const email = e.target.email.value;
                const pass = e.target.pass.value;
                
                const foundUser = users.find(u => u.email === email && u.pass === pass);
                if(foundUser) {
                    setCurrentUser(foundUser);
                    setView(`${foundUser.role.toLowerCase()}-dashboard`);
                    showMsg(`Welcome back, ${foundUser.name}!`, 'success');
                } else {
                    showMsg("Invalid Staff Email or Password. Please try again.", 'error');
                }
            };

            const handlePatientSignup = async (e) => {
                e.preventDefault();
                const email = e.target.email.value;
                const password = e.target.password.value;
                const name = e.target.name.value;
                const age = e.target.age.value;
                const gender = e.target.gender.value;
                const symptoms = e.target.symptoms.value;

                if (!isDbReady) {
                    showMsg("Database is still connecting. Please try again in a moment.", "error");
                    return;
                }

                try {
                    let userId = "PAT-" + Math.floor(Math.random() * 1000000);
                    
                    // Attempt real Firebase Signup if connection to services is active
                    if (auth && dbStatusType === "success") {
                        try {
                            const { createUserWithEmailAndPassword } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js");
                            const credentials = await createUserWithEmailAndPassword(auth, email, password);
                            userId = credentials.user.uid;
                        } catch (authError) {
                            // If credentials error, display to patient
                            showMsg(authError.message.replace("Firebase: ", ""), "error");
                            return;
                        }
                    }

                    const newPatient = {
                        id: userId,
                        email: email,
                        name: name,
                        age: age,
                        gender: gender,
                        symptoms: symptoms,
                        status: "Awaiting Volunteer",
                        timestamp: Date.now(),
                        assignedDoctor: null,
                        prescription: null,
                        billAmount: null
                    };

                    // Document Save using target strict path schema
                    if (db && dbStatusType === "success") {
                        const { doc, setDoc } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
                        const docRef = doc(db, 'artifacts', 'medcamp-6a0f8', 'public', 'data', 'patients', userId);
                        await setDoc(docRef, newPatient);
                    } else {
                        // Offline local sandbox push
                        setPatients(prev => [...prev, newPatient]);
                    }

                    setMyPatientId(userId);
                    showMsg("Account Created! You are in the queue.", "success");
                    setView('patient-portal');
                } catch (err) {
                    console.error(err);
                    showMsg("Failed to create patient record.", "error");
                }
            };

            const handlePatientLogin = async (e) => {
                e.preventDefault();
                const email = e.target.email.value;
                const password = e.target.password.value;

                if (!isDbReady) {
                    showMsg("Database is still syncing. Try again in a moment.", "error");
                    return;
                }

                try {
                    let verifiedUserId = null;

                    if (auth && dbStatusType === "success") {
                        try {
                            const { signInWithEmailAndPassword } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js");
                            const credentials = await signInWithEmailAndPassword(auth, email, password);
                            verifiedUserId = credentials.user.uid;
                        } catch (authErr) {
                            showMsg("Authentication Failed: Check credentials or console setups.", "error");
                            return;
                        }
                    } else {
                        // Sandbox Fallback Authentication checks
                        const match = patients.find(p => p.email === email);
                        if (match) {
                            verifiedUserId = match.id;
                        } else {
                            showMsg("No record found locally matching this email address.", "error");
                            return;
                        }
                    }

                    setMyPatientId(verifiedUserId);
                    showMsg("Logged in to Patient Portal.", "success");
                    setView('patient-portal');
                } catch (err) {
                    showMsg("Login error. Please try again.", "error");
                }
            };

            const handleLogout = () => {
                setCurrentUser(null);
                setMyPatientId(null);
                setView('home');
                showMsg("Logged out successfully.", 'info');
                setIsMobileMenuOpen(false);
            };

            const handleNavigation = (targetView) => {
                setView(targetView);
                setIsMobileMenuOpen(false);
            };

            const handleAddUser = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const newUser = {
                    id: 'U-' + Date.now(),
                    name: fd.get('name'),
                    email: fd.get('email'),
                    pass: fd.get('pass'),
                    role: fd.get('role')
                };
                setUsers([...users, newUser]);
                e.target.reset();
                showMsg(`Added new ${newUser.role}: ${newUser.name}`, 'success');
            };

            const removeUser = (id) => {
                setUsers(users.filter(u => u.id !== id));
                showMsg("User removed from system.", 'info');
            };

            const handleVolunteerScan = async (qrData) => {
                setScanningFor(null);
                if (qrData.startsWith("PATIENT|")) {
                    const parts = qrData.split("|");
                    const id = parts[1];
                    let patient = patients.find(p => p.id === id);
                    
                    if (!patient) {
                        try {
                            patient = {
                                id: parts[1],
                                name: parts[2],
                                age: parts[3],
                                gender: parts[4],
                                symptoms: parts.slice(5).join("|"), 
                                status: "Awaiting Volunteer",
                                timestamp: Date.now(),
                                assignedDoctor: null,
                                prescription: null,
                                billAmount: null
                            };
                            
                            if (db && dbStatusType === "success") {
                                const { doc, setDoc } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
                                const docRef = doc(db, 'artifacts', 'medcamp-6a0f8', 'public', 'data', 'patients', patient.id);
                                await setDoc(docRef, patient);
                            } else {
                                setPatients(prev => [...prev, patient]);
                            }
                        } catch (e) {
                            showMsg("Database sync issue with scanned patient.", "error");
                        }
                    }
                    
                    setScannedPatient(patient);
                    showMsg("Patient QR scan read successfully.", 'success');
                } else {
                    showMsg("Invalid code formatting. Expecting CareNet Patient Identity card.", 'error');
                }
            };

            const assignDoctor = async (doctorId) => {
                if(!scannedPatient || !isDbReady) return;
                
                try {
                    if (db && dbStatusType === "success") {
                        const { doc, updateDoc } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
                        const docRef = doc(db, 'artifacts', 'medcamp-6a0f8', 'public', 'data', 'patients', scannedPatient.id);
                        await updateDoc(docRef, { 
                            status: 'In Queue', 
                            assignedDoctor: doctorId 
                        });
                    } else {
                        setPatients(prev => prev.map(p => 
                            p.id === scannedPatient.id ? { ...p, status: 'In Queue', assignedDoctor: doctorId } : p
                        ));
                    }
                    
                    setScannedPatient(null);
                    showMsg("Patient assigned to doctor desk queue.", 'success');
                } catch (error) {
                    showMsg("Error syncing doctor assignment.", 'error');
                    console.error(error);
                }
            };

            const handleEndSession = async (patientId, prescriptionText) => {
                if (!prescriptionText.trim()) {
                    showMsg("Please enter prescription instructions before finalizing.", 'error');
                    return;
                }

                try {
                    if (db && dbStatusType === "success") {
                        const { doc, updateDoc } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
                        const docRef = doc(db, 'artifacts', 'medcamp-6a0f8', 'public', 'data', 'patients', patientId);
                        await updateDoc(docRef, { 
                            status: 'Prescribed', 
                            prescription: prescriptionText 
                        });
                    } else {
                        setPatients(prev => prev.map(p => 
                            p.id === patientId ? { ...p, status: 'Prescribed', prescription: prescriptionText } : p
                        ));
                    }
                    
                    showMsg("Session Completed! Prescription generated & dispatched directly to Patient card.", 'success');
                } catch (error) {
                    showMsg("Error processing session completion.", 'error');
                    console.error(error);
                }
            };

            const handlePharmacyScan = async (qrData) => {
                setScanningFor(null);
                if (qrData.startsWith("RX|")) {
                    const parts = qrData.split("|");
                    const id = parts[1];
                    let patient = patients.find(p => p.id === id);
                    
                    if (!patient) {
                        try {
                            patient = {
                                id: parts[1],
                                name: parts[2],
                                prescription: parts.slice(3).join("|"), 
                                status: 'Prescribed',
                                timestamp: Date.now()
                            };
                            
                            if (db && dbStatusType === "success") {
                                const { doc, setDoc } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
                                const docRef = doc(db, 'artifacts', 'medcamp-6a0f8', 'public', 'data', 'patients', patient.id);
                                await setDoc(docRef, patient);
                            } else {
                                setPatients(prev => [...prev, patient]);
                            }
                            setBillingPatient(patient);
                            showMsg("Prescription scanned successfully.", 'success');
                        } catch (e) {
                            console.error(e);
                        }
                    } else if (patient && patient.status === 'Prescribed') {
                        setBillingPatient(patient);
                        showMsg("Prescription scanned successfully.", 'success');
                    } else {
                        showMsg("Patient state is already billed, closed, or invalid.", 'error');
                    }
                } else {
                    showMsg("Invalid Rx format detected.", 'error');
                }
            };

            const collectPayment = async (e) => {
                e.preventDefault();
                const amount = e.target.amount.value;
                
                try {
                    if (db && dbStatusType === "success") {
                        const { doc, updateDoc } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
                        const docRef = doc(db, 'artifacts', 'medcamp-6a0f8', 'public', 'data', 'patients', billingPatient.id);
                        await updateDoc(docRef, { 
                            status: 'Completed', 
                            billAmount: amount 
                        });
                    } else {
                        setPatients(prev => prev.map(p => 
                            p.id === billingPatient.id ? { ...p, status: 'Completed', billAmount: amount } : p
                        ));
                    }
                    
                    setBillingPatient(null);
                    showMsg(`Payment of ₹${amount} logged. Medicines dispensed.`, 'success');
                } catch (error) {
                    showMsg("Error updating checkout status.", "error");
                    console.error(error);
                }
            };

            return (
                <div className="flex flex-col min-h-screen relative">
                    {message && <MessageBox message={message.text} type={message.type} onClose={() => setMessage(null)} />}
                    
                    {/* Database status banner info */}
                    <div className={`text-center py-1.5 text-xs font-semibold px-4 flex justify-center items-center gap-2 border-b transition-all duration-300 ${
                        dbStatusType === 'success' ? 'bg-emerald-50 text-emerald-800 dark:bg-emerald-950/20 dark:text-emerald-300 border-emerald-100 dark:border-emerald-900/50' :
                        dbStatusType === 'warning' ? 'bg-amber-50 text-amber-800 dark:bg-amber-950/20 dark:text-amber-300 border-amber-100 dark:border-amber-900/50' :
                        'bg-blue-50 text-blue-800 dark:bg-blue-950/20 dark:text-blue-300 border-blue-100 dark:border-blue-900/50'
                    }`}>
                        <span className="flex h-2.5 w-2.5 relative">
                            <span className={`animate-ping absolute inline-flex h-full w-full rounded-full opacity-75 ${
                                dbStatusType === 'success' ? 'bg-emerald-400' : dbStatusType === 'warning' ? 'bg-amber-400' : 'bg-blue-400'
                            }`}></span>
                            <span className={`relative inline-flex rounded-full h-2.5 w-2.5 ${
                                dbStatusType === 'success' ? 'bg-emerald-500' : dbStatusType === 'warning' ? 'bg-amber-500' : 'bg-blue-500'
                            }`}></span>
                        </span>
                        {dbStatusText}
                    </div>

                    <nav className="sticky top-0 z-50 glass border-b dark:border-slate-700 px-6 py-4 flex flex-wrap justify-between items-center shadow-sm">
                        {/* Logo */}
                        <div className="flex items-center space-x-3 cursor-pointer animate-fade-in" onClick={() => handleNavigation('home')}>
                            <div className="bg-emerald-600 text-white p-2 rounded-xl shadow-md"><i className="fa-solid fa-hand-holding-medical text-xl"></i></div>
                            <div>
                                <span className="font-bold text-xl tracking-tight text-emerald-700 dark:text-emerald-400 block">CareNet</span>
                                <span className="text-[10px] font-bold uppercase tracking-widest text-slate-500 block -mt-1">NGO Medical Camp</span>
                            </div>
                        </div>

                        {/* Mobile Hamburger Button */}
                        <button 
                            className="md:hidden text-slate-600 dark:text-slate-300 hover:text-emerald-600 focus:outline-none p-2"
                            onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}
                        >
                            <i className={`fa-solid ${isMobileMenuOpen ? 'fa-xmark' : 'fa-bars'} text-2xl`}></i>
                        </button>

                        {/* Navigation Items */}
                        <div className={`${isMobileMenuOpen ? 'flex' : 'hidden'} md:flex flex-col md:flex-row w-full md:w-auto mt-4 md:mt-0 space-y-4 md:space-y-0 md:space-x-4 items-center bg-white/95 dark:bg-slate-800/95 md:bg-transparent md:dark:bg-transparent p-4 md:p-0 rounded-2xl md:rounded-none shadow-xl md:shadow-none absolute md:relative top-16 md:top-auto left-4 right-4 md:left-auto md:right-auto border md:border-none dark:border-slate-700`}>
                            
                            <GoogleTranslate />

                            <button onClick={() => setDarkMode(!darkMode)} className="text-slate-600 dark:text-amber-400 hover:bg-slate-100 dark:hover:bg-slate-700 p-2.5 rounded-xl flex items-center justify-center w-full md:w-auto transition">
                                <i className={`fa-solid ${darkMode ? 'fa-sun' : 'fa-moon'} text-lg md:mr-0 mr-3`}></i>
                                <span className="md:hidden font-semibold">Change Theme</span>
                            </button>
                            
                            {currentUser || myPatientId ? (
                                <div className="flex flex-col md:flex-row w-full md:w-auto items-center space-y-3 md:space-y-0 md:space-x-3">
                                    <span className="text-sm font-semibold text-slate-600 dark:text-slate-300 px-4 py-2 bg-slate-100 dark:bg-slate-900 rounded-xl border dark:border-slate-700 w-full md:w-auto text-center shadow-sm">
                                        <i className="fa-solid fa-user-circle mr-2 text-emerald-600 dark:text-emerald-400"></i>
                                        {currentUser ? `${currentUser.name} (${currentUser.role})` : 'Registered Patient'}
                                    </span>
                                    <button onClick={handleLogout} className="text-red-500 hover:text-white hover:bg-red-500 font-bold text-sm bg-red-50 dark:bg-red-900/20 px-5 py-2.5 rounded-xl transition w-full md:w-auto text-center border border-red-100 dark:border-red-900">
                                        Logout
                                    </button>
                                </div>
                            ) : (
                                <div className="flex flex-col md:flex-row gap-2 w-full md:w-auto">
                                    <button onClick={() => handleNavigation('patient-login')} className="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-md transition transform hover:-translate-y-0.5 text-center">
                                        Patient Registration / Login
                                    </button>
                                    <button onClick={() => handleNavigation('login')} className="border border-slate-300 dark:border-slate-600 hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-200 px-5 py-2.5 rounded-xl text-sm font-bold transition text-center">
                                        Staff Login
                                    </button>
                                </div>
                            )}
                        </div>
                    </nav>

                    <main className="flex-grow container mx-auto px-4 py-8 flex flex-col items-center justify-center relative">
                        
                        {/* VIEW: HOME */}
                        {view === 'home' && !currentUser && !myPatientId && (
                            <div className="text-center max-w-2xl w-full animate-fade-in">
                                <div className="w-24 h-24 bg-emerald-100 text-emerald-600 dark:bg-emerald-900/30 dark:text-emerald-400 rounded-full flex items-center justify-center text-4xl mx-auto mb-6 shadow-inner">
                                    <i className="fa-solid fa-notes-medical animate-pulse"></i>
                                </div>
                                <h1 className="text-4xl md:text-5xl font-black text-slate-900 dark:text-white leading-tight mb-4">CareNet Cloud Medical Camp</h1>
                                <p className="text-slate-600 dark:text-slate-300 text-lg mb-8 px-4">Live multi-device database synchronized NGO platform. Sign-up or register below to secure your real-time digital consult ticket.</p>
                                
                                <div className="flex flex-col sm:flex-row justify-center gap-4">
                                    <button onClick={() => handleNavigation('patient-login')} className="bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-8 py-4 rounded-full shadow-lg transition transform hover:-translate-y-1">
                                        <i className="fa-solid fa-user-injured mr-2"></i> Patient Portal & Sign Up
                                    </button>
                                    <button onClick={() => handleNavigation('login')} className="bg-slate-800 hover:bg-slate-900 dark:bg-slate-700 dark:hover:bg-slate-600 text-white font-bold px-8 py-4 rounded-full shadow-lg transition transform hover:-translate-y-1">
                                        <i className="fa-solid fa-user-shield mr-2"></i> Staff Terminal
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* VIEW: STAFF PORTAL LOGIN */}
                        {view === 'login' && !currentUser && (
                            <div className="w-full max-w-md bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-700 animate-fade-in">
                                <h2 className="text-2xl font-black mb-1 text-center text-slate-800 dark:text-white">Secure Staff Portal</h2>
                                <p className="text-slate-500 text-center text-xs mb-6">Internal systems access for verified camp officers</p>
                                <form onSubmit={handleLogin} className="space-y-5">
                                    <div>
                                        <label className="block text-xs font-bold uppercase text-slate-500 mb-2">Staff Email Address</label>
                                        <input required name="email" type="email" placeholder="e.g. vol@ngo.com" className="w-full px-4 py-3 border border-slate-200 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-900 focus:ring-2 focus:ring-emerald-500 outline-none" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold uppercase text-slate-500 mb-2">Internal Password</label>
                                        <input required name="pass" type="password" placeholder="••••••••" className="w-full px-4 py-3 border border-slate-200 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-900 focus:ring-2 focus:ring-emerald-500 outline-none" />
                                    </div>
                                    <button type="submit" className="w-full py-3.5 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl shadow-md transition">Verify Credentials</button>
                                </form>
                                <div className="mt-6 p-4 bg-amber-50 dark:bg-amber-900/20 rounded-xl text-xs text-amber-800 dark:text-amber-300 border border-amber-200 dark:border-amber-800/50">
                                    <strong className="block mb-1"><i className="fa-solid fa-circle-info mr-1"></i> Demo Credentials:</strong>
                                    Admin: admin@ngo.com (admin123)<br/>
                                    Volunteer: vol@ngo.com (vol123)<br/>
                                    Doctor Desk: doc1@ngo.com (doc123)<br/>
                                    Pharmacy Desk: pharm@ngo.com (pharm123)
                                </div>
                            </div>
                        )}

                        {/* VIEW: PATIENT SIGNUP & LOGIN FORM */}
                        {view === 'patient-login' && !myPatientId && (
                            <div className="w-full max-w-lg bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-700 animate-fade-in">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-2xl font-black text-slate-800 dark:text-white">Patient Desk</h2>
                                    <div className="flex gap-2">
                                        <button 
                                            onClick={() => setPatientAuthMode("login")} 
                                            className={`px-3 py-1 text-xs font-bold rounded-lg transition ${patientAuthMode === 'login' ? 'bg-emerald-600 text-white' : 'bg-slate-100 text-slate-600 dark:bg-slate-700 dark:text-slate-200'}`}
                                        >
                                            Log In
                                        </button>
                                        <button 
                                            onClick={() => setPatientAuthMode("signup")} 
                                            className={`px-3 py-1 text-xs font-bold rounded-lg transition ${patientAuthMode === 'signup' ? 'bg-emerald-600 text-white' : 'bg-slate-100 text-slate-600 dark:bg-slate-700 dark:text-slate-200'}`}
                                        >
                                            Sign Up
                                        </button>
                                    </div>
                                </div>

                                {patientAuthMode === 'signup' ? (
                                    <form onSubmit={handlePatientSignup} className="space-y-4">
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-xs font-bold uppercase text-slate-500 mb-1">Email Address (Signup)</label>
                                                <input required name="email" type="email" placeholder="patient@gmail.com" className="w-full px-4 py-2.5 border border-slate-200 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-900 focus:ring-2 focus:ring-emerald-500 outline-none text-sm" />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold uppercase text-slate-500 mb-1">Set Password</label>
                                                <input required name="password" type="password" placeholder="Min 6 characters" className="w-full px-4 py-2.5 border border-slate-200 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-900 focus:ring-2 focus:ring-emerald-500 outline-none text-sm" />
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold uppercase text-slate-500 mb-1">Full Name</label>
                                            <input required name="name" type="text" placeholder="e.g. Rahul Sharma" className="w-full px-4 py-2.5 border border-slate-200 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-900 focus:ring-2 focus:ring-emerald-500 outline-none text-sm" />
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-xs font-bold uppercase text-slate-500 mb-1">Age</label>
                                                <input required name="age" type="number" placeholder="Years" className="w-full px-4 py-2.5 border border-slate-200 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-900 focus:ring-2 focus:ring-emerald-500 outline-none text-sm" />
                                            </div>
                                            <div>
                                                <label className="block text-xs font-bold uppercase text-slate-500 mb-1">Gender</label>
                                                <select required name="gender" className="w-full px-4 py-2.5 border border-slate-200 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-900 focus:ring-2 focus:ring-emerald-500 outline-none text-sm">
                                                    <option value="">Select...</option><option>Male</option><option>Female</option><option>Other</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold uppercase text-slate-500 mb-1">Primary Health Symptoms</label>
                                            <textarea required name="symptoms" rows="3" placeholder="Fever, cough, joint pain..." className="w-full px-4 py-2.5 border border-slate-200 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-900 focus:ring-2 focus:ring-emerald-500 outline-none text-sm"></textarea>
                                        </div>
                                        <button type="submit" disabled={!isDbReady} className="w-full py-4 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl shadow-lg transition">
                                            Register & Create Ticket Card
                                        </button>
                                    </form>
                                ) : (
                                    <form onSubmit={handlePatientLogin} className="space-y-5">
                                        <div>
                                            <label className="block text-xs font-bold uppercase text-slate-500 mb-2">Registered Email</label>
                                            <input required name="email" type="email" placeholder="patient@gmail.com" className="w-full px-4 py-3 border border-slate-200 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-900 focus:ring-2 focus:ring-emerald-500 outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold uppercase text-slate-500 mb-2">Password</label>
                                            <input required name="password" type="password" placeholder="••••••••" className="w-full px-4 py-3 border border-slate-200 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-900 focus:ring-2 focus:ring-emerald-500 outline-none" />
                                        </div>
                                        <button type="submit" disabled={!isDbReady} className="w-full py-3.5 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl shadow-lg transition">
                                            Log In to Patient Portal
                                        </button>
                                    </form>
                                )}
                            </div>
                        )}

                        {/* VIEW: PATIENT PORTAL (QR & Consult Realtime status display) */}
                        {view === 'patient-portal' && myPatientId && (
                            <div className="w-full max-w-md animate-fade-in space-y-6">
                                <button onClick={() => setView('home')} className="text-slate-500 hover:text-slate-800 dark:hover:text-white font-semibold mb-2 block"><i className="fa-solid fa-arrow-left mr-2"></i> Back to Home</button>
                                
                                {(() => {
                                    const me = patients.find(p => p.id === myPatientId);
                                    if(!me) return (
                                        <div className="bg-yellow-50 dark:bg-yellow-950/20 text-yellow-800 dark:text-yellow-300 p-6 rounded-2xl text-center border border-yellow-200 dark:border-yellow-900">
                                            <p className="font-bold text-sm">Searching cloud registry for patient record...</p>
                                            <p className="text-xs mt-1">If this is a new local test, try creating a Patient profile inside Sandbox mode.</p>
                                        </div>
                                    );

                                    let qrData, title, desc, bgColor, statusColor;
                                    
                                    if (me.status === 'Completed') {
                                        return (
                                            <div className="bg-emerald-50 dark:bg-emerald-900/20 p-8 rounded-3xl text-center border border-emerald-200 dark:border-emerald-800 shadow-xl">
                                                <div className="w-20 h-20 bg-emerald-500 text-white rounded-full flex items-center justify-center text-4xl mx-auto mb-4 shadow-lg"><i className="fa-solid fa-circle-check"></i></div>
                                                <h2 className="text-2xl font-black text-emerald-700 dark:text-emerald-400 mb-2">Consulation Finished</h2>
                                                <p className="text-slate-600 dark:text-slate-300 text-sm mb-4">Thank you, {me.name}. Your billing is finalized and prescriptions have been successfully dispensed.</p>
                                                <span className="text-xs bg-emerald-100 text-emerald-800 dark:bg-emerald-950 dark:text-emerald-300 px-3 py-1 rounded-full font-bold">Closed Voucher: ₹{me.billAmount}</span>
                                            </div>
                                        );
                                    }

                                    if (me.status === 'Prescribed') {
                                        qrData = `RX|${me.id}|${me.name}|${me.prescription}`;
                                        title = "Pharmacy Rx QR Code";
                                        desc = "Show this barcode at the pharmacy counter to retrieve your prescribed medicines.";
                                        bgColor = "bg-rose-50 dark:bg-rose-950/20 border-rose-200 dark:border-rose-900/50";
                                        statusColor = "bg-rose-600 text-white";
                                    } else {
                                        qrData = `PATIENT|${me.id}|${me.name}|${me.age}|${me.gender}|${me.symptoms}`;
                                        title = "Identity & Queue Ticket QR";
                                        desc = me.status === 'In Queue' 
                                            ? `Assigned to desk. Please wait at the doctor's cabin lobby.`
                                            : `Awaiting a Camp volunteer to verify and assign you a consultant doctor.`;
                                        bgColor = "bg-blue-50 dark:bg-blue-950/20 border-blue-200 dark:border-blue-900/50";
                                        statusColor = me.status === 'In Queue' ? 'bg-indigo-600 text-white' : 'bg-slate-200 text-slate-800 dark:bg-slate-700 dark:text-slate-200';
                                    }

                                    return (
                                        <div className={`${bgColor} p-8 rounded-3xl border text-center shadow-xl animate-fade-in-down`}>
                                            <h2 className="text-xl font-black mb-1 dark:text-white">{title}</h2>
                                            <span className={`inline-block px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wide mb-6 ${statusColor}`}>{me.status}</span>
                                            
                                            <div className="bg-white p-4 rounded-2xl shadow-md inline-block mb-6 border dark:border-slate-200">
                                                <img src={getQRImage(qrData)} alt="QR Code" className="w-56 h-56" />
                                            </div>
                                            
                                            <h3 className="text-2xl font-black text-slate-800 dark:text-white mb-2">{me.name}</h3>
                                            <p className="text-sm font-medium text-slate-600 dark:text-slate-300 max-w-sm mx-auto">{desc}</p>
                                        </div>
                                    )
                                })()}
                            </div>
                        )}

                        {/* VIEW: ADMIN DASHBOARD */}
                        {view === 'admin-dashboard' && currentUser?.role === 'Admin' && (
                            <div className="w-full max-w-5xl animate-fade-in space-y-6">
                                <div className="flex justify-between items-end mb-4 border-b border-slate-200 dark:border-slate-700 pb-4">
                                    <div>
                                        <h2 className="text-3xl font-black text-slate-800 dark:text-white">Admin Control Panel</h2>
                                        <p className="text-slate-500">Manage NGO staff accounts and view sync metrics.</p>
                                    </div>
                                    <div className="text-right">
                                        <span className="block text-3xl font-black text-emerald-600">{patients.length}</span>
                                        <span className="text-[10px] uppercase font-bold text-slate-400 tracking-wider">Patients Registered</span>
                                    </div>
                                </div>

                                <div className="grid md:grid-cols-3 gap-6">
                                    <div className="md:col-span-1 bg-white dark:bg-slate-800 p-6 rounded-2xl border dark:border-slate-700 shadow-sm h-fit">
                                        <h3 className="font-bold text-lg mb-4 flex items-center"><i className="fa-solid fa-user-plus mr-2 text-emerald-500"></i> Add Staff Account</h3>
                                        <form onSubmit={handleAddUser} className="space-y-4">
                                            <input required name="name" type="text" placeholder="Full Name" className="w-full px-3 py-2 border dark:border-slate-600 rounded-lg bg-slate-50 dark:bg-slate-900 text-sm outline-none focus:ring-1 focus:ring-emerald-500" />
                                            <input required name="email" type="email" placeholder="Email Address" className="w-full px-3 py-2 border dark:border-slate-600 rounded-lg bg-slate-50 dark:bg-slate-900 text-sm outline-none focus:ring-1 focus:ring-emerald-500" />
                                            <input required name="pass" type="password" placeholder="Password" className="w-full px-3 py-2 border dark:border-slate-600 rounded-lg bg-slate-50 dark:bg-slate-900 text-sm outline-none focus:ring-1 focus:ring-emerald-500" />
                                            <select required name="role" className="w-full px-3 py-2 border dark:border-slate-600 rounded-lg bg-slate-50 dark:bg-slate-900 text-sm outline-none">
                                                <option value="">Select Role...</option><option>Volunteer</option><option>Doctor</option><option>Pharmacy</option>
                                            </select>
                                            <button type="submit" className="w-full py-2 bg-slate-800 dark:bg-slate-700 text-white font-bold rounded-lg hover:bg-slate-900 transition">Create Staff</button>
                                        </form>
                                    </div>

                                    <div className="md:col-span-2 bg-white dark:bg-slate-800 p-6 rounded-2xl border dark:border-slate-700 shadow-sm">
                                        <h3 className="font-bold text-lg mb-4 flex items-center"><i className="fa-solid fa-users-gear mr-2 text-blue-500"></i> Active System Members</h3>
                                        <div className="space-y-3">
                                            {users.map(u => (
                                                <div key={u.id} className="flex justify-between items-center p-3 bg-slate-50 dark:bg-slate-900 rounded-xl border border-slate-100 dark:border-slate-700">
                                                    <div className="flex items-center space-x-4">
                                                        <div className="w-10 h-10 rounded-full bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 flex justify-center items-center font-bold">
                                                            {u.role.charAt(0)}
                                                        </div>
                                                        <div>
                                                            <div className="font-bold text-slate-800 dark:text-white text-sm">{u.name} <span className="ml-2 text-[10px] uppercase bg-slate-200 dark:bg-slate-700 px-2 py-0.5 rounded">{u.role}</span></div>
                                                            <div className="text-xs text-slate-500">{u.email}</div>
                                                        </div>
                                                    </div>
                                                    {u.role !== 'Admin' && (
                                                        <button onClick={() => removeUser(u.id)} className="text-slate-400 hover:text-red-500 p-2"><i className="fa-solid fa-trash"></i></button>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* VIEW: VOLUNTEER DASHBOARD */}
                        {view === 'volunteer-dashboard' && currentUser?.role === 'Volunteer' && (
                            <div className="w-full max-w-4xl animate-fade-in space-y-6">
                                <div className="text-center mb-8">
                                    <h2 className="text-3xl font-black text-amber-600 dark:text-amber-500">Volunteer Station</h2>
                                    <p className="text-slate-500">Scan patient QRs and assign triage queues in real-time.</p>
                                </div>

                                {scanningFor === 'volunteer' ? (
                                    <QRScanner title="Scan Patient Identity QR" onScan={handleVolunteerScan} onCancel={() => setScanningFor(null)} />
                                ) : (
                                    <div className="flex justify-center mb-6">
                                        <button onClick={() => setScanningFor('volunteer')} className="bg-amber-500 hover:bg-amber-600 text-white font-bold px-8 py-4 rounded-full shadow-lg transition transform hover:-translate-y-1 flex items-center text-lg w-full md:w-auto justify-center">
                                            <i className="fa-solid fa-qrcode mr-3 text-2xl"></i> Scan Patient Card QR
                                        </button>
                                    </div>
                                )}

                                {scannedPatient && (
                                    <div className="bg-white dark:bg-slate-800 p-6 rounded-2xl border-2 border-amber-400 shadow-xl max-w-lg mx-auto transform transition animate-fade-in-down">
                                        <div className="flex justify-between items-start mb-4 border-b border-slate-100 dark:border-slate-700 pb-4">
                                            <div>
                                                <h3 className="text-xl font-bold dark:text-white">{scannedPatient.name}</h3>
                                                <p className="text-sm text-slate-500">{scannedPatient.age} yrs • {scannedPatient.gender}</p>
                                            </div>
                                            <span className="bg-amber-100 text-amber-800 text-xs font-bold px-2 py-1 rounded uppercase">Processing</span>
                                        </div>
                                        <div className="mb-6">
                                            <p className="text-xs font-bold text-slate-400 uppercase mb-1">Reported Symptoms</p>
                                            <p className="text-sm bg-slate-50 dark:bg-slate-900 p-3 rounded-lg border dark:border-slate-700">{scannedPatient.symptoms}</p>
                                        </div>
                                        
                                        <div>
                                            <p className="text-xs font-bold text-slate-400 uppercase mb-2">Assign to Consultant Doctor</p>
                                            <div className="space-y-2">
                                                {users.filter(u => u.role === 'Doctor').map(doc => {
                                                    const qCount = getDoctorQueueCount(doc.id);
                                                    const isFree = qCount === 0;
                                                    return (
                                                        <button key={doc.id} onClick={() => assignDoctor(doc.id)} 
                                                            className={`w-full flex justify-between items-center p-3 rounded-xl border transition ${isFree ? 'bg-emerald-50 border-emerald-200 hover:bg-emerald-100 dark:bg-emerald-950/20 dark:border-emerald-900/50' : 'bg-slate-50 border-slate-200 hover:bg-slate-100 dark:bg-slate-800 dark:border-slate-700'}`}>
                                                            <span className="font-bold text-slate-800 dark:text-slate-200">{doc.name}</span>
                                                            {isFree 
                                                                ? <span className="text-xs font-bold text-emerald-600 bg-emerald-100 px-2 py-1 rounded-full"><i className="fa-solid fa-check mr-1"></i> FREE</span>
                                                                : <span className="text-xs font-bold text-amber-600 bg-amber-100 px-2 py-1 rounded-full"><i className="fa-solid fa-users mr-1"></i> Queue: {qCount}</span>
                                                            }
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* VIEW: DOCTOR DASHBOARD */}
                        {view === 'doctor-dashboard' && currentUser?.role === 'Doctor' && (
                            <div className="w-full max-w-4xl animate-fade-in space-y-6">
                                <div className="flex flex-col md:flex-row justify-between items-center mb-6 pb-4 border-b border-slate-200 dark:border-slate-700">
                                    <div className="text-center md:text-left">
                                        <h2 className="text-3xl font-black text-blue-600 dark:text-blue-400">Doctor's Desk</h2>
                                        <p className="text-slate-500 font-medium">Welcome, {currentUser.name}</p>
                                    </div>
                                    <div className="mt-4 md:mt-0 bg-white dark:bg-slate-800 px-4 py-2 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 flex items-center space-x-3">
                                        <span className="text-sm font-bold text-slate-500 uppercase">CURRENT QUEUE:</span>
                                        <span className="text-2xl font-black text-blue-600">{getDoctorQueueCount(currentUser.id)}</span>
                                    </div>
                                </div>

                                {(() => {
                                    // Live reactive queue matching doctor ID and state in real-time
                                    const myQueue = patients.filter(p => p.assignedDoctor === currentUser.id && p.status === 'In Queue');
                                    
                                    if (myQueue.length === 0) {
                                        return (
                                            <div className="bg-slate-50 dark:bg-slate-800/50 border-2 border-dashed border-slate-300 dark:border-slate-600 rounded-3xl p-12 text-center">
                                                <div className="w-24 h-24 bg-white dark:bg-slate-700 rounded-full flex items-center justify-center text-5xl mx-auto mb-6 text-slate-300 shadow-sm">
                                                    <i className="fa-solid fa-mug-hot"></i>
                                                </div>
                                                <h3 className="text-2xl font-bold text-slate-700 dark:text-slate-300 mb-2">You are currently Free</h3>
                                                <p className="text-slate-500">Volunteers see your status as "FREE" and can assign patients to you.</p>
                                            </div>
                                        );
                                    }

                                    const activePatient = myQueue[0];

                                    return (
                                        <div className="grid md:grid-cols-5 gap-6">
                                            <div className="md:col-span-3 bg-white dark:bg-slate-800 rounded-3xl shadow-xl border-2 border-blue-400 overflow-hidden relative">
                                                <div className="bg-blue-600 text-white text-xs font-bold uppercase tracking-widest py-1.5 text-center">Active Session</div>
                                                <div className="p-6 md:p-8 space-y-6">
                                                    <div className="flex justify-between items-start border-b dark:border-slate-700 pb-4">
                                                        <div>
                                                            <h3 className="text-2xl font-black text-slate-800 dark:text-white mb-1">{activePatient.name}</h3>
                                                            <p className="text-sm font-medium text-slate-500">ID: {activePatient.id} • {activePatient.age} yrs • {activePatient.gender}</p>
                                                        </div>
                                                    </div>
                                                    <div>
                                                        <h4 className="text-xs font-bold text-slate-400 uppercase mb-2"><i className="fa-solid fa-notes-medical mr-1"></i> Patient Symptoms</h4>
                                                        <div className="bg-rose-50 text-rose-900 dark:bg-rose-900/20 dark:text-rose-200 p-4 rounded-xl text-sm font-medium border border-rose-100 dark:border-rose-800">
                                                            {activePatient.symptoms}
                                                        </div>
                                                    </div>
                                                    <form onSubmit={(e) => {
                                                        e.preventDefault();
                                                        handleEndSession(activePatient.id, e.target.rx.value);
                                                    }}>
                                                        <h4 className="text-xs font-bold text-slate-400 uppercase mb-2"><i className="fa-solid fa-prescription-bottle mr-1"></i> Add Prescription</h4>
                                                        <textarea required name="rx" rows="4" placeholder="Type medicines, dosage, and instructions here..." className="w-full px-4 py-3 border border-slate-200 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-900 focus:ring-2 focus:ring-blue-500 outline-none mb-4 resize-none"></textarea>
                                                        
                                                        <button type="submit" className="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-lg transition flex items-center justify-center text-lg">
                                                            End Session & Dispatch Rx <i className="fa-solid fa-arrow-right ml-3"></i>
                                                        </button>
                                                    </form>
                                                </div>
                                            </div>

                                            <div className="md:col-span-2 space-y-4 animate-fade-in">
                                                <h3 className="font-bold text-slate-700 dark:text-slate-300 uppercase tracking-wide text-sm flex items-center">
                                                    <i className="fa-solid fa-list-ul mr-2"></i> Next in line ({myQueue.length - 1})
                                                </h3>
                                                {myQueue.slice(1).map((p, index) => (
                                                    <div key={p.id} className="bg-white/60 dark:bg-slate-800/60 border border-slate-200 dark:border-slate-700 p-4 rounded-2xl flex items-center space-x-4 opacity-75">
                                                        <div className="w-8 h-8 rounded-full bg-slate-200 dark:bg-slate-700 flex items-center justify-center font-bold text-slate-500 text-xs">
                                                            {index + 1}
                                                        </div>
                                                        <div>
                                                            <div className="font-bold text-slate-700 dark:text-slate-300 text-sm">{p.name}</div>
                                                            <div className="text-xs text-slate-500">{p.age}y • {p.gender}</div>
                                                        </div>
                                                    </div>
                                                ))}
                                                {myQueue.length === 1 && (
                                                    <p className="text-sm text-slate-400 italic bg-white dark:bg-slate-800 p-4 rounded-xl border border-dashed dark:border-slate-700 text-center">No other patients waiting.</p>
                                                )}
                                            </div>
                                        </div>
                                    );
                                })()}
                            </div>
                        )}

                        {/* VIEW: PHARMACY COUNTER DASHBOARD */}
                        {view === 'pharmacy-dashboard' && currentUser?.role === 'Pharmacy' && (
                            <div className="w-full max-w-4xl animate-fade-in space-y-6">
                                <div className="text-center mb-8">
                                    <h2 className="text-3xl font-bold text-rose-600 dark:text-rose-500">Pharmacy Counter</h2>
                                    <p className="text-slate-500">Scan Rx QR codes to dispense medication and collect bills.</p>
                                </div>

                                {scanningFor === 'pharmacy' ? (
                                    <QRScanner title="Scan Patient Rx QR Code" onScan={handlePharmacyScan} onCancel={() => setScanningFor(null)} />
                                ) : (
                                    <div className="flex justify-center mb-6">
                                        <button onClick={() => setScanningFor('pharmacy')} className="bg-rose-500 hover:bg-rose-600 text-white font-bold px-8 py-4 rounded-full shadow-lg transition transform hover:-translate-y-1 flex items-center text-lg w-full md:w-auto justify-center">
                                            <i className="fa-solid fa-qrcode mr-3 text-2xl"></i> Scan Patient Rx QR
                                        </button>
                                    </div>
                                )}

                                {billingPatient && (
                                    <div className="bg-white dark:bg-slate-800 p-8 rounded-3xl border border-slate-200 dark:border-slate-700 shadow-xl max-w-xl mx-auto transform transition animate-fade-in-down">
                                        <div className="flex items-center space-x-3 mb-6 pb-6 border-b dark:border-slate-700">
                                            <div className="w-12 h-12 bg-rose-100 text-rose-600 rounded-full flex items-center justify-center text-2xl"><i className="fa-solid fa-prescription"></i></div>
                                            <div>
                                                <h3 className="text-xl font-bold dark:text-white">Rx for {billingPatient.name}</h3>
                                                <p className="text-sm text-slate-500">Patient ID: {billingPatient.id}</p>
                                            </div>
                                        </div>
                                        
                                        <div className="mb-6">
                                            <p className="text-xs font-bold text-slate-400 uppercase mb-2">Doctor's Prescription Details</p>
                                            <div className="bg-slate-50 dark:bg-slate-900 p-4 rounded-xl border border-dashed dark:border-slate-700 font-mono text-sm dark:text-slate-300 whitespace-pre-line">
                                                {billingPatient.prescription}
                                            </div>
                                        </div>

                                        <form onSubmit={collectPayment} className="space-y-4 bg-emerald-50 dark:bg-emerald-950/10 p-5 rounded-2xl border border-emerald-100 dark:border-emerald-900/50">
                                            <div>
                                                <label className="block text-xs font-bold uppercase text-emerald-700 dark:text-emerald-400 mb-2">Collect Bill Amount (₹)</label>
                                                <div className="relative">
                                                    <span className="absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-500 font-bold">₹</span>
                                                    <input required name="amount" type="number" min="0" step="1" placeholder="e.g. 100" className="w-full pl-8 pr-4 py-3 border border-emerald-200 dark:border-emerald-700/50 rounded-xl bg-white dark:bg-slate-800 focus:ring-2 focus:ring-emerald-500 outline-none font-bold text-lg" />
                                                </div>
                                            </div>
                                            <button type="submit" className="w-full py-4 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl shadow-lg transition flex items-center justify-center text-lg">
                                                <i className="fa-solid fa-cash-register mr-2"></i> Collect Payment & Dispense
                                            </button>
                                        </form>
                                    </div>
                                )}
                            </div>
                        )}

                    </main>
                    
                    <footer className="text-center py-6 text-sm font-medium text-slate-400 border-t dark:border-slate-800">
                        &copy; 2026 CareNet NGO Medical Camp Management System. Realtime cloud-synchronized active network.
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
